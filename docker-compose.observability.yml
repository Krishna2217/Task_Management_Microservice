# Optional observability stack. Bring up alongside the main stack with:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml --profile monitoring up --build
#
# All services here are gated behind the `monitoring` profile, so a plain
# `docker compose up` (using only docker-compose.yml) is completely unaffected.

services:
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - taskmgmt-net

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - taskmgmt-net

  loki:
    image: grafana/loki:latest
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    networks:
      - taskmgmt-net

  promtail:
    image: grafana/promtail:latest
    profiles: ["monitoring"]
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - taskmgmt-net

  tempo:
    image: grafana/tempo:latest
    profiles: ["monitoring"]
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API (used by Grafana's Tempo datasource)
      - "4318:4318"   # OTLP HTTP receiver (services send traces here)
      - "4317:4317"   # OTLP gRPC receiver
    networks:
      - taskmgmt-net

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:

networks:
  taskmgmt-net:
    driver: bridge
