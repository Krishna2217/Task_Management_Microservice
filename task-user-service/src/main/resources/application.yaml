server:
  port: 8081

spring:
  application:
    name: USER-SERVICE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    # overridable via DB_URL/DB_USER/DB_PASSWORD env vars instead of hardcoding credentials
    url: ${DB_URL:jdbc:mysql://localhost:3306/task_user_service}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # schema is owned by Flyway migrations now; Hibernate only checks the mapping matches
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

app:
  jwt:
    # overridable via JWT_SECRET env var; the placeholder default is local-dev-only, never use it in a real deployment
    secret: ${JWT_SECRET:changeme-local-only-32-bytes-minimum-length-here}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318}/v1/traces
  observations:
    annotations:
      enabled: true

info:
  app:
    name: '@project.name@'
    version: '@project.version@'