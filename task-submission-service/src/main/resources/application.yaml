server:
  port: 8083

spring:
  application:
    name: SUBMISSION-SERVICE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    # overridable via DB_URL/DB_USER/DB_PASSWORD env vars instead of hardcoding credentials
    url: ${DB_URL:jdbc:mysql://localhost:3306/task_submission_service}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318}/v1/traces
  observations:
    annotations:
      enabled: true

info:
  app:
    name: '@project.name@'
    version: '@project.version@'
