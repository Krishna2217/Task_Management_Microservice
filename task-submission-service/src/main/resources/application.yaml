server:
  port: 8083

spring:
  application:
    name: SUBMISSION-SERVICE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    # overridable via DB_URL/DB_USER/DB_PASSWORD env vars instead of hardcoding credentials
    url: ${DB_URL:jdbc:mysql://localhost:3306/task_submission_service}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # schema is owned by Flyway migrations now; Hibernate only checks the mapping matches
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 3000

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

resilience4j:
  circuitbreaker:
    instances:
      taskService:
        registerHealthIndicator: true
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 10

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: circuitBreakers,diskSpace
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318}/v1/traces
  observations:
    annotations:
      enabled: true

info:
  app:
    name: '@project.name@'
    version: '@project.version@'
