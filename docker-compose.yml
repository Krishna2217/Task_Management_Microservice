services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: task_user_service
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - taskmgmt-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - taskmgmt-net

  eureka-server:
    # context is the repo root (not ./eureka-server) so the Dockerfile can COPY .git in -
    # git-commit-id-maven-plugin needs it to embed the real commit SHA into /actuator/info
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    image: ghcr.io/krishna2217/taskmgmt-eureka-server:latest
    ports:
      - "8070:8070"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    networks:
      - taskmgmt-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ghcr.io/krishna2217/taskmgmt-api-gateway:latest
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskmgmt-net

  task-user-service:
    build:
      context: .
      dockerfile: task-user-service/Dockerfile
    image: ghcr.io/krishna2217/taskmgmt-task-user-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskmgmt-net

  task-service:
    build:
      context: .
      dockerfile: task-service/Dockerfile
    image: ghcr.io/krishna2217/taskmgmt-task-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - taskmgmt-net

  task-submission-service:
    build:
      context: .
      dockerfile: task-submission-service/Dockerfile
    image: ghcr.io/krishna2217/taskmgmt-task-submission-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - taskmgmt-net

  frontend:
    build: ./frontendService/vite-project
    image: ghcr.io/krishna2217/taskmgmt-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - taskmgmt-net

volumes:
  mysql-data:
  redis-data:

networks:
  taskmgmt-net:
    driver: bridge
