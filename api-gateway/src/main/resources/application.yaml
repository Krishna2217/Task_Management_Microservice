server:
  port: 8000

spring:
  application:
    name: GATEWAY-SERVICE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            # UserController is mapped at "api/users" (plural); "/api/user/**" never matched it
            - Path=/auth/**, /user/**, /api/users/**

        - id: TASK-SERVICE
          uri: lb://TASK-SERVICE
          predicates:
            - Path=/api/task/**, /tasks/**

        - id: SUBMISSION-SERVICE
          uri: lb://SUBMISSION-SERVICE
          predicates:
            - Path=/api/submission/**,  /submission/**

      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials, Access-Control-Allow-Origin
            strategy: RETAIN_FIRST # Use UPPERCASE here as required by Spring

      globalcors:
        cors-configuration:
          '[/**]':
            # allowedOrigins("*") is rejected by browsers once credentials are involved; allowedOriginPatterns is the CORS-spec-compliant equivalent
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/
