server:
  port: 8000

spring:
  application:
    name: GATEWAY-SERVICE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            # UserController is mapped at "api/users" (plural); "/api/user/**" never matched it
            - Path=/auth/**, /user/**, /api/users/**

        - id: TASK-SERVICE
          uri: lb://TASK-SERVICE
          predicates:
            - Path=/api/task/**, /tasks/**

        - id: SUBMISSION-SERVICE
          uri: lb://SUBMISSION-SERVICE
          predicates:
            - Path=/api/submission/**,  /submission/**

      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials, Access-Control-Allow-Origin
            strategy: RETAIN_FIRST # Use UPPERCASE here as required by Spring
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            key-resolver: "#{@userKeyResolver}"

      globalcors:
        cors-configuration:
          '[/**]':
            # allowedOrigins("*") is rejected by browsers once credentials are involved; allowedOriginPatterns is the CORS-spec-compliant equivalent
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

app:
  jwt:
    # must match task-user-service's app.jwt.secret exactly, since the gateway validates the same tokens
    secret: ${JWT_SECRET:changeme-local-only-32-bytes-minimum-length-here}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318}/v1/traces
  observations:
    annotations:
      enabled: true

info:
  app:
    name: '@project.name@'
    version: '@project.version@'
