server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      # only the JSON-logging (docker profile) containers get parsed into labels;
      # plain-text logs from services run outside the docker profile pass through unlabeled
      - json:
          expressions:
            level: level
            traceId: traceId
            spanId: spanId
      - labels:
          level:
          traceId:
          spanId:
