name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontendService/**"
  pull_request:
    branches: [main]
    paths:
      - "frontendService/**"
  workflow_call: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontendService/vite-project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm cache
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontendService/vite-project/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
