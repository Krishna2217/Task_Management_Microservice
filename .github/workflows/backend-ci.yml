name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "eureka-server/**"
      - "api-gateway/**"
      - "task-user-service/**"
      - "task-service/**"
      - "task-submission-service/**"
      - "**/pom.xml"
  pull_request:
    branches: [main]
    paths:
      - "eureka-server/**"
      - "api-gateway/**"
      - "task-user-service/**"
      - "task-service/**"
      - "task-submission-service/**"
      - "**/pom.xml"
  workflow_call: {}

jobs:
  build-and-test:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - eureka-server
          - api-gateway
          - task-user-service
          - task-service
          - task-submission-service

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and test
        working-directory: ${{ matrix.module }}
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.module }}
          path: ${{ matrix.module }}/target/surefire-reports
          if-no-files-found: ignore
