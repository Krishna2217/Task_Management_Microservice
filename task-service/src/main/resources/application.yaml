server:
  port: 8082

spring:
  application:
    name: TASK-SERVICE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    # overridable via DB_URL/DB_USER/DB_PASSWORD env vars instead of hardcoding credentials
    url: ${DB_URL:jdbc:mysql://localhost:3306/task_service}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/